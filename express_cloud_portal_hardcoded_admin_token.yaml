rules:
  - id: express_cloud_portal_hardcoded_admin_token
    message: "Hardcoded administrative token 'SUPER_SECRET_ADMIN_DEBUG_2026' found in src/routes/health.js allows improper authentication and unauthorized access."
    metadata:
      source_title: Security Audit - Express-Cloud-Portal v2.1.0
      source_url: https://cyber-intel-archive.io/reports/ecp-vulnerability-audit
      references:
        - https://owasp.org/www-community/vulnerabilities/Hard_Coded_Credentials
      cwe: CWE-798
      owasp: A2_2021:Cryptographic Failures
      confidence: high
    languages:
      - javascript
    severity: HIGH
    patterns:
      - pattern-inside: |
          const $TOKEN = ...
      - pattern: |
          const ADMIN_TOKEN = "SUPER_SECRET_ADMIN_DEBUG_2026"
      - pattern: |
          const adminToken = 'SUPER_SECRET_ADMIN_DEBUG_2026'
      - pattern: |
          const admin_token = 'SUPER_SECRET_ADMIN_DEBUG_2026'
      - pattern-inside: |
          module.exports = {...}
      - pattern: |
          module.exports = {
            adminToken: 'SUPER_SECRET_ADMIN_DEBUG_2026'
          }
