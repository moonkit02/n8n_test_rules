 rules:
  - id: prototype-pollution-deep-merge-utils
    message: "Prototype Pollution vulnerability in deep-merge-utils v1.2.0 via unsafe merge of __proto__ properties leading to potential Denial of Service or Remote Code Execution. Upgrade to v1.2.1 to mitigate."
    metadata:
      source_title: "CVE-2026-99887 - Prototype Pollution in deep-merge-utils"
      source_url: "https://nvd.nist.gov/vuln/detail/CVE-2026-99887"
      references:
        - "https://nvd.nist.gov/vuln/detail/CVE-2026-99887"
      cwe: "CWE-1321"
      owasp: ["A062021-Vulnerable and Outdated Components"]
      confidence: HIGH
    languages:
      - javascript
      - typescript
    severity: CRITICAL
    patterns:
      - pattern-inside: |
          import merge from 'deep-merge-utils'
          ...
      - pattern-either:
          - pattern: |
              merge($OBJ1, $OBJ2)
            where:
              - pattern-not: |
                  __proto__: __proto__
          - pattern: |
              function merge($OBJ1, $OBJ2) {
                ...
                if ($KEY === '__proto__') {
                  // missing or inadequate filtering
                }
                ...
              }

</pre>
