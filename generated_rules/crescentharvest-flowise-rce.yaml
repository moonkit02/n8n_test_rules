rules:\n  - id: crescentharvest-flowise-rce\n    message: \"Remote Code Execution vulnerability in Flowise as exploited by CrescentHarvest campaign (CVE-2025-59528).\"\n    metadata:\n      cve: CVE-2025-59528\n      description: \"Flowise RCE vulnerability exploited by CrescentHarvest. Check for unsafe use of eval or similar functions with attacker-controlled input.\"\n      severity: CRITICAL\n      references:\n        - https://thehackernews.com/2026/02/crescentharvest-campaign-targets-iran.html\n    languages: [python]\n    severity: ERROR\n    mode: taint\n    patterns:\n      - pattern: eval($UNTRUSTED_INPUT)\n        metavars:\n          UNTRUSTED_INPUT:\n            pattern-either:\n              - pattern: $UNTRUSTED_INPUT\n              - pattern: input()\n              - pattern: sys.argv[1]\n              - pattern: os.environ.get($X)\n              - pattern: request.args.get($X)\n              - pattern: request.form.get($X)\n              - pattern: request.cookies.get($X)\n      - pattern-not: |\n          # safe eval usage\n      - pattern-not-inside: |\n          def safe_eval(*args, **kwargs):\n            ...\n    fix:\n      message: \"Apply patches or upgrades recommended by Flowise maintainers to remediate RCE.\"