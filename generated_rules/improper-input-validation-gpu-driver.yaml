rules:\n  - id: improper-input-validation-gpu-driver\n    message: \"Improper input validation in GPU driver function allows privilege escalation\"\n    metadata:\n      cve: \"CVE-XXXX-YYYY\"\n      description: \"GPU driver fails to properly validate user input leading to potential privilege escalation.\"\n    languages: [c, cpp]\n    severity: ERROR\n    mode: taint\n    patterns:\n      - pattern: |\n          if ($INPUT > MAX_ALLOWED) {\n            return ERROR;\n          }\n    pattern-not:\n      - pattern: if ($INPUT <= MAX_ALLOWED)\n    pattern-inside:\n      - pattern: function $FUNC(...) {\n          ...\n          if ($INPUT > MAX_ALLOWED) {\n            return ERROR;\n          }\n          ...\n        }\n  - id: memory-corruption-gpu-driver\n    message: \"Memory corruption vulnerability in GPU driver code causing arbitrary code execution\"\n    metadata:\n      cve: \"CVE-AAAA-BBBB\"\n      description: \"Improper memory handling in GPU driver triggers buffer overflow and arbitrary code execution.\"\n    languages: [c, cpp]\n    severity: ERROR\n    mode: taint\n    patterns-either:\n      - pattern: |\n          $X = $Y;\n          memcpy($DEST, $SRC, $N);\n        metavars:\n          DEST:\n            taint: source\n          N:\n            taint: source\n      - pattern: |\n          $X = $Y;\n          strcpy($DEST, $SRC);\n        metavars:\n          DEST:\n            taint: source\n    pattern-not:\n      - pattern: if (sizeof($DEST) >= $N)\n      - pattern: if (strlen($SRC) < sizeof($DEST))\n