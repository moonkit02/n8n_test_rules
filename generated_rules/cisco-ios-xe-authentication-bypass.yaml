rules:\n  - id: cisco-ios-xe-authentication-bypass\n    message: 'Detection of authentication bypass vulnerability in Cisco IOS XE (CVE-2023-20198) exploited by Chinese APT actors.'\n    metadata:\n      cve: CVE-2023-20198\n      description: 'Authentication bypass vulnerability allowing unauthenticated access to Cisco IOS XE devices.'\n      source: 'https://www.exploit-db.com/exploits/52427'\n    languages: [python, ruby, javascript, go, java, c, cpp]\n    severity: ERROR\n    mode: taint\n    patterns:\n      - pattern-either:\n          - pattern-inside: |\n              def authenticate_user(...):\n                ...\n          - pattern-inside: |\n              if authenticate_user(...) == false:\n                ...\n      - pattern-not: |\n          # sanitized or checked before\n          def is_authenticated(...):\n            ...\n  - id: cisco-ios-xe-post-auth-command-injection\n    message: 'Detection of post-auth command injection vulnerability in Cisco IOS XE (CVE-2023-20273) exploited by Chinese APT actors.'\n    metadata:\n      cve: CVE-2023-20273\n      description: 'Post-authentication command injection in Cisco IOS XE allowing remote code execution.'\n      source: 'https://www.exploit-db.com/exploits/52427'\n    languages: [python, ruby, javascript, go, java, c, cpp]\n    severity: ERROR\n    mode: taint\n    patterns:\n      - pattern-either:\n          - pattern: |\n              $CMD = input_command\n              system($CMD)\n          - pattern: |\n              exec(input_command)\n      - pattern-not: |\n          # Ignore safe wrapper usage\n          def safe_exec(...):\n            ...\n  - id: cisco-ios-xe-container-shell-exec\n    message: 'Detection of embedded container shell execution vulnerabilities in Cisco IOS XE exploited by Chinese APT actors.'\n    metadata:\n      description: 'Execution of embedded container shells such as Cisco Guest Shell for persistence and lateral movement.'\n      source: 'https://www.exploit-db.com/exploits/52427'\n    languages: [python, ruby, javascript, go, java, c, cpp]\n    severity: WARNING\n    patterns:\n      - pattern: |\n          system("guest-shell" ...)\n  - id: cisco-ios-xe-open-remote-access-ports\n    message: 'Detection of opening of non-standard remote access ports in Cisco IOS XE exploited by Chinese APT actors.'\n    metadata:\n      description: 'Opening of unauthorized remote access ports for lateral movement and persistence.'\n      source: 'https://www.exploit-db.com/exploits/52427'\n    languages: [python, ruby, javascript, go, java, c, cpp]\n    severity: WARNING\n    patterns:\n      - pattern: |\n          open_port(non_standard_port)\n  - id: cisco-ios-xe-encrypted-tunnel-setup\n    message: 'Detection of GRE or IPsec encrypted tunnel setup in Cisco IOS XE exploited by Chinese APT actors.'\n    metadata:\n      description: 'Establishment of encrypted tunnels (GRE, IPsec) for lateral movement and data exfiltration.'\n      source: 'https://www.exploit-db.com/exploits/52427'\n    languages: [python, ruby, javascript, go, java, c, cpp]\n    severity: WARNING\n    patterns:\n      - pattern-either:\n          - pattern: |\n              setup_gre_tunnel(...)\n          - pattern: |\n              setup_ipsec_tunnel(...)\n