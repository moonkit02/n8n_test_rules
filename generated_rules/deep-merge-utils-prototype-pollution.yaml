rules:
  - id: deep-merge-utils-prototype-pollution
    message: "Detect use of unsafe deep merge functions vulnerable to Prototype Pollution allowing __proto__ property mutation."
    metadata:
      source_title: "Prototype Pollution in 'deep-merge-utils' v1.2.0"
      source_url: "https://nvd.nist.gov/vuln/detail/CVE-2026-99887"
      references:
        - "https://nvd.nist.gov/vuln/detail/CVE-2026-99887"
      cwe:
        - CWE-1321
      owasp:
        - "A06:2021-Vulnerable and Outdated Components"
      confidence: HIGH
    languages:
      - javascript
    severity: CRITICAL
    patterns:
      - pattern-inside: |
          function merge($DICT1, $DICT2) {
            ...
            $X = $Y
            ...
          }
      - pattern-either:
          - pattern: $DICT1.__proto__ = $DICT2.__proto__
          - pattern: $DICT1["__proto__"] = $DICT2["__proto__"]