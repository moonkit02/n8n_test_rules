rules:\n  - id: crescentharvest-jspdf-npm-vuln\n    message: \"Known vulnerability in npm package jsPDF as used by CrescentHarvest campaign. Check for usage of vulnerable jsPDF versions in project dependencies.\"\n    metadata:\n      severity: MEDIUM\n      description: \"jsPDF package contains vulnerabilities that can be exploited in the CrescentHarvest campaign. Ensure dependencies are updated.\"\n      references:\n        - https://thehackernews.com/2026/02/crescentharvest-campaign-targets-iran.html\n    languages: [javascript, json]\n    severity: WARNING\n    patterns:\n      - pattern-either:\n          - pattern: |\n              require('jspdf')\n          - pattern: |\n              import jsPDF from 'jspdf'\n      - pattern-inside:\n          - \"package.json\"\n          - \"package-lock.json\"\n          - \"yarn.lock\"\n      - pattern-regex:\n          regex: '\"jspdf\"\\s*:\\s*\"(0\\\.(0[0-9]|1[0-2])\\\.|[0-9]+\\..*)\"'\n          # Hypothetical vulnerable versions regex; adjust accordingly\n    fix:\n      message: \"Upgrade jsPDF package to the latest secure version.\"