rules:\n  - id: weak-ssh-credentials-detection\n    message: \"Detect potential usage of weak or default SSH credentials allowing brute force attacks leading to ransomware infection like Interlock targeting FreeBSD servers.\"\n    metadata:\n      category: security\n      technology: [ssh, FreeBSD]\n      description: |\n        Interlock ransomware targets FreeBSD servers by exploiting weak or default SSH credentials through brute force.\n        This rule flags configuration or code patterns that indicate weak SSH authentication setups.\n      reference: https://www.bleepingcomputer.com/news/security/meet-interlock-the-new-ransomware-targeting-freebsd-servers/\n    languages: [generic]\n    severity: ERROR\n    patterns:\n      - pattern: |\n          password = \"$...PASSWORD\"\n        generic_ellipsis_max_span: 0\n      - pattern-not: |\n          password = \"$STRONG_PASSWORD\"\n      - pattern: |\n          sshd_config:\n            ...\n            PermitRootLogin yes\n            PasswordAuthentication yes\n            ...\n      - pattern-not: |\n          sshd_config:\n            ...\n            PermitRootLogin no\n            PasswordAuthentication no\n            ...\n  - id: ssh-brute-force-attack-vector\n    message: \"Detect exposed SSH services vulnerable to brute force password attacks leading to ransomware like Interlock on FreeBSD servers.\"\n    metadata:\n      category: security\n      technology: [ssh]\n      description: |\n        SSH services exposed with weak access controls or no rate limiting can be brute forced.\n        This rule detects configuration or code snippets that may indicate such exposure.\n      reference: https://www.bleepingcomputer.com/news/security/meet-interlock-the-new-ransomware-targeting-freebsd-servers/\n    languages: [generic]\n    severity: ERROR\n    patterns:\n      - pattern: |\n          sshd_config:\n            ...\n            Port 22\n            ...\n      - pattern: |\n          sshd_config:\n            ...\n            AllowUsers $USER\n            ...\n      - pattern-not: |\n          sshd_config:\n            ...\n            MaxAuthTries 3\n            ...\n      - pattern-not: |\n          sshd_config:\n            ...\n            PermitRootLogin no\n            ...\n      - pattern-not: |\n          sshd_config:\n            ...\n            PasswordAuthentication no\n            ...\n