rules:
  - id: express_cloud_portal_command_injection_child_process_exec
    message: "Unsanitized input from POST parameter 'folderName' used in child_process.exec in utils/system.js leads to command injection vulnerability."
    metadata:
      source_title: Security Audit - Express-Cloud-Portal v2.1.0
      source_url: https://cyber-intel-archive.io/reports/ecp-vulnerability-audit
      references:
        - https://owasp.org/www-community/attacks/Command_Injection
      cwe: CWE-77
      owasp: A1_2021:Broken_Access_Control
      confidence: high
    languages:
      - javascript
    severity: HIGH
    mode: taint
    pattern-sources:
      - pattern: req.body.folderName
    pattern-sinks:
      - pattern: exec($CMD, ...)
    pattern-not:
      - pattern: exec(sanitize_input(req.body.folderName), ...)
    pattern-inside: |
      // file utils/system.js
      ...
    